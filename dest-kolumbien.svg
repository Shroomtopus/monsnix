 <stop offset="0" stop-color="#a99cff"/><stop offset="1" stop-color="#5fe6d6"/>
</radialGradient>
<radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
 <stop offset="0" stop-color="rgba(103,220,205,.34)"/><stop offset="1" stop-color="rgba(103,220,205,0)"/>
</radialGradient>
