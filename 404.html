<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Monsnix</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#06080b">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{--bg:#06080b;--ink:#f2efe9;--mut:#8b94a7;--grad:linear-gradient(115deg,#7c5cff,#43e0d0)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Instrument Sans",system-ui,sans-serif;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;
    background-image:radial-gradient(45% 45% at 30% 25%,rgba(124,92,255,.16),transparent 65%),
      radial-gradient(45% 45% at 75% 75%,rgba(67,224,208,.12),transparent 65%)}
  .code{font-family:"Syne",sans-serif;font-weight:800;font-size:clamp(5rem,22vw,11rem);line-height:1;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-family:"Syne",sans-serif;font-weight:700;font-size:clamp(1.3rem,4vw,2rem);margin:.6rem 0 1rem}
  p{color:var(--mut);max-width:28rem;margin:0 auto 2.2rem}
  .btn{display:inline-block;font-family:"Syne",sans-serif;font-weight:600;padding:.95rem 1.7rem;border-radius:999px;
    background:var(--grad);color:#0b0d12;text-decoration:none;margin:0 .4rem .8rem}
  .ghost{background:none;border:1px solid rgba(242,239,233,.2);color:var(--ink)}
  .tag{display:block;margin-top:3rem;font-family:"Space Mono",monospace;font-size:.6rem;letter-spacing:.3em;
    text-transform:uppercase;color:rgba(139,148,167,.6)}
</style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Dieser Ort ist noch unentdeckt.</h1>
    <p>Die Seite, die Du suchst, gibt es nicht — oder sie ist noch nicht bereist. Zurück auf bekannte Routen:</p>
    <a class="btn" href="/home.html">Zur Startseite</a>
    <a class="btn ghost" href="/reisen.html">Reiseberichte</a>
    <span class="tag">Monsnix · Reisejournal</span>
  </main>
</body>
</html>
