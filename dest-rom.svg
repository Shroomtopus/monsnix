 <stop offset="0" stop-color="#05060c"/><stop offset="1" stop-color="#111226"/>
</linearGradient>
<linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
 <stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#43e0d0"/>
</linearGradient>
