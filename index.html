<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dave Frehner — Fotografie &amp; Reisen</title>
<meta name="description" content="Die neue Foto- und Reise-Seite von Dave Frehner entsteht. Bald hier.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0d; --text:#f4f2ee; --muted:#a5a1a0;
    --grad:linear-gradient(100deg,#ff9a62,#ff7d8a 35%,#8aa0ff 70%,#7bdff2);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:"Inter",system-ui,sans-serif;
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:2rem; overflow:hidden; position:relative;
  }
  body::before{
    content:""; position:absolute; inset:-30%; z-index:0;
    background:
      radial-gradient(40% 40% at 25% 30%, rgba(255,140,90,.18), transparent 70%),
      radial-gradient(45% 45% at 75% 70%, rgba(120,160,255,.16), transparent 70%),
      radial-gradient(35% 35% at 60% 25%, rgba(123,223,242,.10), transparent 70%);
    filter:blur(10px);
    animation:drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift{from{transform:translate3d(-2%, -1%,0) scale(1)}to{transform:translate3d(2%,2%,0) scale(1.08)}}
  .wrap{position:relative; z-index:1; text-align:center; max-width:44rem}
  .brand{
    font-family:"Fraunces",serif; font-weight:600; font-size:1.5rem;
    letter-spacing:.01em; margin-bottom:2.5rem;
  }
  .brand em{font-style:italic; font-weight:500;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .badge{
    display:inline-flex; align-items:center; gap:.5rem;
    font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
    color:var(--muted); border:1px solid rgba(255,255,255,.14);
    padding:.5rem 1rem; border-radius:999px; margin-bottom:2rem;
  }
  .badge .dot{width:.5rem; height:.5rem; border-radius:50%;
    background:linear-gradient(90deg,#ff8a5b,#7bdff2); box-shadow:0 0 12px rgba(255,140,90,.7)}
  h1{
    font-family:"Fraunces",serif; font-weight:600; line-height:1.02;
    font-size:clamp(2.6rem,8vw,5rem); letter-spacing:-.01em; margin-bottom:1.4rem;
  }
  h1 .g{background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;}
  p.lead{
    color:var(--muted); font-size:clamp(1rem,2.4vw,1.2rem); line-height:1.6;
    max-width:34rem; margin:0 auto 2.4rem;
  }
  .contact{
    display:inline-block; color:var(--text); text-decoration:none;
    font-size:.95rem; border-bottom:1px solid rgba(255,255,255,.35);
    padding-bottom:2px; transition:border-color .2s,color .2s;
  }
  .contact:hover{color:#fff; border-color:#fff}
  .foot{margin-top:3rem; font-size:.8rem; color:rgba(165,161,160,.6)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="brand">Dave <em>Frehner</em></div>
    <span class="badge"><span class="dot"></span>Fotografie &amp; Reiseblog</span>
    <h1>Bald <span class="g">hier</span>.</h1>
    <p class="lead">Meine neue Seite für Fotografie und Reisen ist im Aufbau —
      Geschichten, Bilder und Eindrücke von unterwegs. Schau bald wieder vorbei.</p>
    <a class="contact" href="mailto:frehner28@gmail.com">frehner28@gmail.com</a>
    <div class="foot">© Dave Frehner · Schweiz</div>
  </main>
</body>
</html>
